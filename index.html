<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Muhammad Rizqan Fadhil — Android Developer</title>
  <meta name="description" content="Portfolio of Muhammad Rizqan Fadhil, an Android Developer building apps with Kotlin & Jetpack Compose." />
  <link rel="canonical" href="https://rizqanfadhil.netlify.app/" />

  <!-- Open Graph / Twitter Card — controls how this link previews when
       shared on WhatsApp, LinkedIn, Twitter, etc. Without these, sharing
       the URL shows no title/image/description at all. -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://rizqanfadhil.netlify.app/" />
  <meta property="og:title" content="Muhammad Rizqan Fadhil — Android Developer" />
  <meta property="og:description" content="Portfolio of Muhammad Rizqan Fadhil, an Android Developer building apps with Kotlin & Jetpack Compose." />
  <meta property="og:image" content="https://rizqanfadhil.netlify.app/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Muhammad Rizqan Fadhil — Android Developer" />
  <meta name="twitter:description" content="Portfolio of Muhammad Rizqan Fadhil, an Android Developer building apps with Kotlin & Jetpack Compose." />
  <meta name="twitter:image" content="https://rizqanfadhil.netlify.app/og-image.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Sets data-theme before first paint so a saved dark-mode preference
       doesn't flash light first — ThemeContext's own effect runs after
       mount, which would be too late to avoid that flash. -->
  <script>
    (function () {
      var saved = localStorage.getItem('portfolio-theme')
      if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark')
    })()
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
